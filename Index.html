<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>UniTable Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/ZKSB8MDN/Screenshot-20260311-184125-Gallery.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/ZKSB8MDN/Screenshot-20260311-184125-Gallery.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; color: var(--text-main); font-family: 'Inter', sans-serif;
            background: var(--bg); min-height: 100vh;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
        }

        #app { max-width: 500px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0 30px; }
        #live-clock {
            font-family: 'JetBrains Mono', monospace; font-size: 3.5rem;
            font-weight: 500; letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--text-dim));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .date-badge {
            display: inline-block; background: var(--primary-glow); color: var(--primary);
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; margin-top: 5px;
        }

        .status-card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 24px; padding: 24px;
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        .status-card.live::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--success); }

        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 1s linear; }

        .day-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .day-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; white-space: nowrap; font-size: 0.85rem; cursor: pointer; color: var(--text-dim);
        }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .event-item {
            background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px;
            border: 1px solid var(--border); display: flex; gap: 15px; align-items: center;
        }
        .time-box { min-width: 60px; text-align: center; font-size: 0.9rem; font-weight: 800; }
        .time-box div:last-child { font-size: 0.7rem; color: var(--text-dim); font-weight: 400; }

        .break-line {
            text-align: center; margin: 10px 0; font-size: 0.75rem; color: var(--primary);
            display: flex; align-items: center; gap: 10px; font-weight: 600;
        }
        .break-line::before, .break-line::after { content: ''; flex: 1; height: 1px; background: currentColor; opacity: 0.2; }
        .live-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; margin-right: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div id="live-clock">00:00</div>
        <div class="date-badge" id="current-date">...</div>
    </header>
    <div id="status-area"></div>
    <div class="day-tabs" id="day-tabs"></div>
    <div id="schedule-list"></div>
</div>

<script>
    const scheduleData = [
        { day: 1, name: "სტატისტიკა ეკონომიკისა და ბიზნესისთვის 1", type: "ლექცია", start: "09:00", end: "10:50", teacher: "შონია ზაზა", room: "201" },
        { day: 1, name: "ფინანსური ინსტიტუტები და ბაზრები", type: "სამუშაო ჯგუფი", start: "13:00", end: "13:50", teacher: "რუფალელი ავთანდილი", room: "1009" },
        { day: 1, name: "ფინანსური ინსტიტუტები და ბაზრები", type: "სამუშაო ჯგუფი", start: "14:00", end: "14:50", teacher: "რუფალელი ავთანდილი", room: "1009" },
        { day: 2, name: "მარკეტინგი 1", type: "სამუშაო ჯგუფი", start: "09:00", end: "09:50", teacher: "კოლხიდა მიხეილ", room: "1106" },
        { day: 2, name: "მარკეტინგი 1", type: "სამუშაო ჯგუფი", start: "10:00", end: "10:50", teacher: "კოლხიდა მიხეილ", room: "1106" },
        { day: 2, name: "ბიზნესის ადმინისტრირების საფუძვლები 2", type: "ლექცია", start: "11:00", end: "11:50", teacher: "ედილაშვილი ქრისტინე", room: "205" },
        { day: 2, name: "ბიზნესის სამართალი", type: "ლექცია", start: "14:00", end: "14:50", teacher: "ყიფიანი გიგა", room: "202" },
        { day: 3, name: "ინოვაციური მენეჯმენტი", type: "სამუშაო ჯგუფი", start: "17:00", end: "17:50", teacher: "ნიჟარაძე დავით", room: "1009" },
        { day: 3, name: "ინოვაციური მენეჯმენტი", type: "სამუშაო ჯგუფი", start: "18:00", end: "18:50", teacher: "ნიჟარაძე დავით", room: "1009" },
        { day: 4, name: "ბიზნესის ადმინისტრირების საფუძვლები 2", type: "სამუშაო ჯგუფი", start: "13:00", end: "14:50", teacher: "მჭედლიშვილი თეიმურაზ", room: "603" },
        { day: 5, name: "ინოვაციური მენეჯმენტი", type: "ლექცია", start: "11:00", end: "11:50", teacher: "ნიჟარაძე დავით", room: "204" },
        { day: 5, name: "მარკეტინგი 1", type: "ლექცია", start: "14:00", end: "14:50", teacher: "მღებრიშვილი ხათუნა", room: "1110" },
        { day: 6, name: "სტატისტიკა ეკონომიკისა და ბიზნესისთვის 1", type: "სამუშაო ჯგუფი", start: "09:00", end: "09:50", teacher: "ოქროშიაშვილი მარიამ", room: "1117" },
        { day: 6, name: "სტატისტიკა ეკონომიკისა და ბიზნესისთვის 1", type: "სამუშაო ჯგუფი", start: "10:00", end: "10:50", teacher: "ოქროშიაშვილი მარიამ", room: "1117" },
        { day: 6, name: "ბიზნესის სამართალი", type: "სამუშაო ჯგუფი", start: "13:00", end: "14:50", teacher: "წერეთელი მარიამი", room: "603" },
        { day: 6, name: "ფინანსური ინსტიტუტები და ბაზრები", type: "ლექცია", start: "16:00", end: "16:50", teacher: "ყურაშვილი ირაკლი", room: "208" }
    ];

    const days = ["კვირა", "ორშაბათი", "სამშაბათი", "ოთხშაბათი", "ხუთშაბათი", "პარასკევი", "შაბათი"];
    let selectedDay = new Date().getDay() || 1;

    const t2m = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
    const formatTime = (totalMin) => {
        if (totalMin < 60) return `${totalMin}წთ`;
        const h = Math.floor(totalMin / 60);
        const m = totalMin % 60;
        return m > 0 ? `${h}სთ ${m}წთ` : `${h}სთ`;
    };

    function updateApp() {
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const currentDay = now.getDay();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('ka-GE', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('current-date').innerText = days[currentDay];

        const todaySchedule = scheduleData.filter(e => e.day === currentDay).sort((a,b) => t2m(a.start) - t2m(b.start));
        const active = todaySchedule.find(e => currentTime >= t2m(e.start) && currentTime < t2m(e.end));
        const next = todaySchedule.find(e => t2m(e.start) > currentTime);

        const statusArea = document.getElementById('status-area');
        if (active) {
            const percent = ((currentTime - t2m(active.start)) / (t2m(active.end) - t2m(active.start))) * 100;
            statusArea.innerHTML = `<div class="status-card live"><div><span class="live-dot"></span> მიმდინარეობს</div><h2>${active.name}</h2><div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div><div style="margin-top:10px; font-size:0.8rem; color:var(--text-dim)">ოთახი: ${active.room} | ${active.end}-მდე</div></div>`;
        } else if (next) {
            statusArea.innerHTML = `<div class="status-card"><div>შემდეგი ლექცია</div><h2>${next.name}</h2><div style="font-size:0.8rem; color:var(--text-dim)">იწყება ${formatTime(t2m(next.start) - currentTime)}-ში (${next.start})</div></div>`;
        } else {
            statusArea.innerHTML = `<div class="status-card" style="opacity:0.6; text-align:center">დღეისთვის ყველაფერი დასრულდა 🙌</div>`;
        }
    }

    function renderSchedule() {
        const list = document.getElementById('schedule-list');
        list.innerHTML = '';
        const dayEvents = scheduleData.filter(e => e.day === selectedDay).sort((a,b) => t2m(a.start) - t2m(b.start));
        dayEvents.forEach((e, i) => {
            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `<div class="time-box"><div>${e.start}</div><div>${e.end}</div></div><div><h4 style="margin:0">${e.name}</h4><div style="font-size:0.75rem; color:var(--text-dim)">${e.type} • ოთახი ${e.room}</div></div>`;
            list.appendChild(item);
            if (i < dayEvents.length - 1) {
                const gap = t2m(dayEvents[i+1].start) - t2m(e.end);
                if (gap >= 5) {
                    const brk = document.createElement('div'); brk.className = 'break-line';
                    brk.innerText = `შესვენება: ${formatTime(gap)}`;
                    list.appendChild(brk);
                }
            }
        });
    }

    // Tabs Init
    const tabContainer = document.getElementById('day-tabs');
    for(let i=1; i<=6; i++) {
        const btn = document.createElement('div'); btn.className = `tab ${selectedDay === i ? 'active' : ''}`;
        btn.innerText = days[i];
        btn.onclick = () => { selectedDay = i; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderSchedule(); };
        tabContainer.appendChild(btn);
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    updateApp(); renderSchedule(); setInterval(updateApp, 30000);
</script>
</body>
</html>
